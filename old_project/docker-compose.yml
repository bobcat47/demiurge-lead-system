version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: demiurge-postgres
    environment:
      POSTGRES_USER: demiurge
      POSTGRES_PASSWORD: ${DB_PASSWORD:-demiurge_secret}
      POSTGRES_DB: demiurge
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./packages/database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demiurge"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for Queue
  redis:
    image: redis:7-alpine
    container_name: demiurge-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes

  # Crawler Worker
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: demiurge-worker
    environment:
      - NODE_ENV=production
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - REDIS_URL=redis://redis:6379
      - CRAWLER_ENABLED=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./apps/worker:/app/apps/worker
      - ./packages:/app/packages
      - worker_node_modules:/app/node_modules
    restart: unless-stopped

  # Next.js Web Dashboard
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: demiurge-web
    environment:
      - NODE_ENV=production
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - worker
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  worker_node_modules:
