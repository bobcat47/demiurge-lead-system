  <text x="800" y="315" fill="#10b981" font-family="monospace" font-size="24" font-weight="bold">96</text>
  <text x="840" y="315" fill="#fff" font-family="monospace" font-size="24" font-weight="bold">4</text>
  
  <rect x="280" y="360" width="590" height="70" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)"/>
  <text x="320" y="380" fill="rgba(255,255,255,0.4)" font-family="monospace" font-size="10">LD-2846</text>
