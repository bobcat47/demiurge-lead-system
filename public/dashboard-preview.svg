  <!-- Stats Cards -->
  <rect x="260" y="100" width="210" height="100" rx="12" fill="url(#card)" stroke="rgba(255,255,255,0.06)"/>
  <text x="290" y="135" fill="#10b981" font-family="system-ui" font-size="12">▲ +12%</text>
  <text x="290" y="165" fill="#fff" font-family="monospace" font-size="28" font-weight="bold">47</text>
  <text x="290" y="185" fill="rgba(255,255,255,0.4)" font-family="system-ui" font-size="11">ACTIVE TARGETS</text>
  
  <rect x="490" y="100" width="210" height="100" rx="12" fill="url(#card)" stroke="rgba(255,255,255,0.06)"/>
  <text x="520" y="135" fill="#10b981" font-family="system-ui" font-size="12">▲ +2</text>
  <text x="520" y="165" fill="#fff" font-family="monospace" font-size="28" font-weight="bold">8</text>
  <text x="520" y="185" fill="rgba(255,255,255,0.4)" font-family="system-ui" font-size="11">SIGNAL SOURCES</text>
  
