  <text x="960" y="330" fill="rgba(255,255,255,0.8)" font-family="system-ui" font-size="12">Local Services Forum</text>
  <text x="1140" y="330" fill="rgba(255,255,255,0.4)" font-family="monospace" font-size="10">94%</text>
  
  <circle cx="940" cy="360" r="4" fill="#f59e0b"/>
  <text x="960" y="365" fill="rgba(255,255,255,0.8)" font-family="system-ui" font-size="12">Nextdoor API</text>
  <text x="1140" y="365" fill="rgba(255,255,255,0.4)" font-family="monospace" font-size="10">76%</text>
  
