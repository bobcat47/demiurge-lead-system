  <text x="50" y="170" fill="rgba(255,255,255,0.5)" font-family="system-ui" font-size="13">Target Acquisition</text>
  <text x="50" y="210" fill="rgba(255,255,255,0.5)" font-family="system-ui" font-size="13">Signal Sources</text>
  <text x="50" y="250" fill="rgba(255,255,255,0.5)" font-family="system-ui" font-size="13">Asset Database</text>
  
  <!-- Main Content Area -->
