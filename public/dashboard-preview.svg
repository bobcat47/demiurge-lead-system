<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#151520"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.05)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.02)"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bg)"/>
  
  <!-- Grid Pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="700" fill="url(#grid)"/>
  
  <!-- Sidebar -->
  <rect x="0" y="0" width="240" height="700" fill="#0a0a0f" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  
  <!-- Logo Area -->
  <circle cx="40" cy="40" r="20" fill="none" stroke="url(#accent)" stroke-width="2"/>
  <circle cx="40" cy="40" r="5" fill="#00d4ff"/>
  <text x="70" y="35" fill="#fff" font-family="system-ui" font-size="16" font-weight="bold">DEMIURGE</text>
  <text x="70" y="52" fill="#00d4ff" font-family="monospace" font-size="10">OS v2.0</text>
  
  <!-- Menu Items -->
