  <rect x="280" y="440" width="590" height="70" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)"/>
  <text x="320" y="460" fill="rgba(255,255,255,0.4)" font-family="monospace" font-size="10">LD-2845</text>
