  <text x="935" y="485" fill="#00d4ff" font-family="system-ui" font-size="14" font-weight="bold">⚡ Quick Deploy</text>
  
  <rect x="935" y="510" width="220" height="40" rx="8" fill="rgba(0,212,255,0.1)" stroke="rgba(0,212,255,0.2)"/>
  <text x="955" y="535" fill="#00d4ff" font-family="system-ui" font-size="13">New Scout Mission →</text>
  
  <rect x="935" y="560" width="220" height="40" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)"/>
  <text x="955" y="585" fill="rgba(255,255,255,0.7)" font-family="system-ui" font-size="13">Add Provider Asset →</text>
  
  <rect x="935" y="610" width="220" height="40" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)"/>
  <text x="955" y="635" fill="rgba(255,255,255,0.7)" font-family="system-ui" font-size="13">Export Intelligence →</text>
